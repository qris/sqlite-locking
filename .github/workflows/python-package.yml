# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install pdm
        pdm install
        pdm add pytest
        ls -la /home/runner/work/sqlite-locking/sqlite-locking
        ls -la /home/runner/work/sqlite-locking/sqlite-locking/.venv
        ls -la /home/runner/work/sqlite-locking/sqlite-locking/.venv/bin
    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        pdm run ruff check
    - name: Test with pytest
      run: |
        # pdm run pytest -v
        $GITHUB_WORKSPACE/.venv/bin/pytest -v
